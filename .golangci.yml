linters:
  enable-all: true
  disable:
    - exhaustruct   # too noisy for struct literals
    - gochecknoglobals  # globals are sometimes necessary (flags, loggers)
    - gomnd         # magic numbers are fine in context
    - wsl           # whitespace style is too opinionated
    - nlreturn      # conflicts with other style rules
    - varnamelen    # short names are idiomatic Go
    - ireturn       # returning interfaces is common and valid
    - depguard      # no import restrictions needed

linters-settings:
  cyclop:
    max-complexity: 10
  funlen:
    lines: 80
    statements: 50
  gocognit:
    min-complexity: 15
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  gocyclo:
    min-complexity: 10
  godot:
    scope: declarations
    capital: true
  govet:
    enable-all: true
  lll:
    line-length: 120
  misspell:
    locale: US
  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
  tagliatelle:
    case:
      rules:
        json: snake

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

run:
  timeout: 5m
