issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals
    - gomnd
    - ireturn
    - nlreturn
    - varnamelen
    - wsl
  enable-all: true
linters-settings:
  cyclop:
    max-complexity: 10
  funlen:
    lines: 80
    statements: 50
  gocognit:
    min-complexity: 15
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  gocyclo:
    min-complexity: 10
  godot:
    capital: true
    scope: declarations
  govet:
    enable-all: true
  lll:
    line-length: 120
  misspell:
    locale: US
  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true
  revive:
    rules:
      - name: exported
      - name: package-comments
      - name: var-naming
  tagliatelle:
    case:
      rules:
        json: snake
run:
  timeout: 5m
